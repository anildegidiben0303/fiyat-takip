# fly.toml app configuration file generated for fiyat-takip on 2026-06-25T11:08:18+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fiyat-takip'
primary_region = 'ams'

[build]

[env]
  DB_PATH = '/app/data/fiyatlar.db'
  PORT = '3000'

[[mounts]]
  source = 'fiyat_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
